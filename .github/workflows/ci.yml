name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.25', '1.26']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Set up Node (for tree-sitter CLI)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install tree-sitter CLI
        run: npm install -g tree-sitter-cli

      - name: Install tree-sitter grammars
        run: |
          mkdir -p ~/.config/codefuse/grammars
          for lang in go python java rust javascript typescript c cpp; do
            case $lang in
              typescript) repo="tree-sitter/tree-sitter-typescript/typescript" ;;
              javascript) repo="tree-sitter/tree-sitter-javascript" ;;
              c) repo="tree-sitter/tree-sitter-c" ;;
              cpp) repo="tree-sitter/tree-sitter-cpp" ;;
              *) repo="tree-sitter/tree-sitter-${lang}" ;;
            esac
            git clone --depth 1 "https://github.com/${repo}.git" ~/.config/codefuse/grammars/tree-sitter-${lang} 2>/dev/null || true
          done
          mkdir -p ~/.config/tree-sitter
          echo '{"parser-directories":["'"$HOME"'/.config/codefuse/grammars"]}' > ~/.config/tree-sitter/config.json

      - name: Build
        run: go build ./cmd/codefuse

      - name: Test
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Vet
        run: go vet ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
          fail_ci_if_error: false

  test-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        go-version: ['1.25']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install tree-sitter CLI
        run: npm install -g tree-sitter-cli

      - name: Build
        run: go build ./cmd/codefuse

      - name: Test
        run: go test -v -race ./...

      - name: Vet
        run: go vet ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: go fmt
        run: |
          if [ "$(gofmt -l . | wc -l)" -gt 0 ]; then
            echo "Files need formatting:"
            gofmt -l .
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m
